# create the file
cat > index.html <<'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random REntry Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg:#0d0d0d;
    --fg:#e0e0e0;
    --accent:#3a86ff;
    --accent-dark:#2c6ed5;
    --radius:12px;
    --shadow:rgba(0,0,0,0.4);
  }
  html,body{
    height:100%;
    margin:0;
    font-family:system-ui,Arial,sans-serif;
    background:var(--bg);
    color:var(--fg);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
  #container{
    max-width:90vw;
    padding:2rem;
  }
  button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    font-size:1.5rem;
    padding:1.5rem 3rem;
    cursor:pointer;
    transition:background .2s,transform .1s,box-shadow .2s;
    box-shadow:0 4px 12px var(--shadow);
  }
  button:hover{
    background:var(--accent-dark);
    box-shadow:0 6px 16px var(--shadow);
  }
  button:active{
    transform:scale(0.98);
  }
  #spinner{
    margin-top:1.5rem;
    width:48px;
    height:48px;
    border:5px solid rgba(255,255,255,.2);
    border-top:5px solid var(--accent);
    border-radius:50%;
    animation:spin .9s linear infinite;
    display:none;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  #msg{
    margin-top:1rem;
    font-size:.9rem;
    opacity:.8;
  }
</style>
</head>
<body>
<div id="container">
  <button id="goBtn">🚀 Go to a random REntry page</button>
  <div id="spinner"></div>
  <div id="msg"></div>
</div>

<script>
/* ---------- CONFIG ---------- */
const MIN_SLUG_LEN = 5;          // most REntry slugs are 5‑6 chars
const MAX_SLUG_LEN = 6;
const MAX_ATTEMPTS = 15;         // try a few times before giving up
const TIMEOUT_MS   = 5000;       // 5 s per request
const PROXY_PREFIX = 'https://api.allorigins.win/get?url='; // CORS‑proxy

/* ---------- HELPERS ---------- */
function randomSlug(){
  const len = Math.floor(Math.random()*(MAX_SLUG_LEN-MIN_SLUG_LEN+1))+MIN_SLUG_LEN;
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let s = '';
  for(let i=0;i<len;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

/* Fetch through AllOrigins – returns {ok, html} */
function fetchPage(slug){
  const target = `https://rentry.org/${slug}`;
  const proxy = `${PROXY_PREFIX}${encodeURIComponent(target)}`;
  return new Promise(resolve=> {
    const controller = new AbortController();
    const timer = setTimeout(()=>controller.abort(),TIMEOUT_MS);
    fetch(proxy,{signal:controller.signal})
      .then(res=> {
        clearTimeout(timer);
        if(!res.ok) return resolve({ok:false});
        return res.json().then(data=>resolve({ok:true, html:data.contents}));
      })
      .catch(()=> {
        clearTimeout(timer);
        resolve({ok:false});
      });
  });
}

/* Heuristic: real pages are noticeably larger than the empty template */
function looksLikeRealPage(html){
  // empty template is ~400 bytes; give a comfortable margin
  return html && html.length > 800;
}

/* ---------- MAIN ---------- */
const btn = document.getElementById('goBtn');
const spinner = document.getElementById('spinner');
const msg = document.getElementById('msg');

btn.addEventListener('click', async ()=>{
  btn.disabled = true;
  spinner.style.display = 'block';
  msg.textContent = '';

  for(let attempt=1; attempt<=MAX_ATTEMPTS; attempt++){
    const slug = randomSlug();
    const {ok, html} = await fetchPage(slug);
    if(ok && looksLikeRealPage(html)){
      const url = `https://rentry.org/${slug}`;
      // redirect – change to window.open(url,'_blank') if you prefer a new tab
      window.location.href = url;
      return;
    }
    msg.textContent = `Attempt ${attempt}/${MAX_ATTEMPTS}: no real page found, trying another…`;
  }

  // All attempts failed
  msg.textContent = 'Sorry, couldn’t locate a valid REntry page after several tries. Please try again later.';
  btn.disabled = false;
  spinner.style.display = 'none';
});
</script>
</body>
</html>
EOF

git add index.html
git commit -m "Add site entry point"

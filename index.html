<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentry Randomizer</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #18181b;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --accent-color: #8b5cf6;
            --accent-hover: #7c3aed;
            --error-color: #ef4444;
            --success-color: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .magic-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 220px;
        }

        .magic-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px);
        }

        .magic-btn:disabled {
            background-color: #3f3f46;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        .loading .spinner { display: block; }

        .status-area {
            margin-top: 2rem;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .status-msg {
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-msg.visible { opacity: 1; }
        .status-msg.error { color: var(--error-color); }
        .status-msg.success { color: var(--success-color); }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Explore the Void</h1>
        <p class="subtitle">Discover a random Rentry page. Verified and valid.</p>

        <button id="randomBtn" class="magic-btn">
            <span class="spinner"></span>
            <span class="btn-text">Launch Discovery</span>
        </button>

        <div class="status-area">
            <span id="statusMsg" class="status-msg"></span>
        </div>
    </div>

    <script>
        const btn = document.getElementById('randomBtn');
        const statusMsg = document.getElementById('statusMsg');
        const btnText = document.querySelector('.btn-text');

        // --- Configuration ---
        // Use a CORS proxy that works well with GitHub Pages
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
        
        // Rentry API endpoint
        const RENTRY_API = 'https://rentry.co/api/v3';

        btn.addEventListener('click', async () => {
            if (btn.disabled) return;
            
            setLoading(true);
            clearStatus();

            try {
                const validUrl = await findValidRentry();
                if (validUrl) {
                    showStatus(`Found valid page! Redirecting...`, 'success');
                    setTimeout(() => {
                        window.location.href = validUrl;
                    }, 800);
                } else {
                    showStatus('Could not find a valid page. Try again.', 'error');
                    setLoading(false);
                }
            } catch (err) {
                console.error(err);
                showStatus('Error: ' + err.message, 'error');
                setLoading(false);
            }
        });

        async function findValidRentry(retries = 15) {
            for (let i = 0; i < retries; i++) {
                const code = generateRandomCode();
                const url = `https://rentry.org/${code}`;
                
                // Try to verify using the API via proxy
                const isValid = await verifyViaApi(code);
                
                if (isValid) {
                    return url;
                }
            }
            return null;
        }

        function generateRandomCode() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            const length = Math.floor(Math.random() * 5) + 6;
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Verify using Rentry's JSON API via CORS proxy
        async function verifyViaApi(code) {
            try {
                // Construct the API URL
                const apiUrl = `${RENTRY_API}/raw/${code}`;
                const proxiedUrl = CORS_PROXY + encodeURIComponent(apiUrl);
                
                const response = await fetch(proxiedUrl);
                
                if (!response.ok) return false;
                
                const data = await response.json();
                
                // API returns 404 in JSON if not found
                if (data.status === 404) return false;
                
                // Check if content exists and is not just whitespace
                if (data.content && data.content.trim().length > 10) {
                    return true;
                }
                
                return false;
            } catch (error) {
                // If API fails, return false to try next code
                console.log("Verification failed for code:", code, error);
                return false;
            }
        }

        function setLoading(isLoading) {
            btn.disabled = isLoading;
            if (isLoading) {
                btn.classList.add('loading');
                btnText.textContent = 'Searching...';
            } else {
                btn.classList.remove('loading');
                btnText.textContent = 'Launch Discovery';
            }
        }

        function showStatus(message, type) {
            statusMsg.textContent = message;
            statusMsg.className = `status-msg ${type} visible`;
        }

        function clearStatus() {
            statusMsg.classList.remove('visible');
            setTimeout(() => { statusMsg.textContent = ''; }, 300);
        }
    </script>
</body>
</html>
